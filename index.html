    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              bebas: ['"Bebas Neue"', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0f172a',
                accent: '#84cc16',
                accentHover: '#65a30d',
                light: '#f8fafc',
              }
            },
            keyframes: {
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'blob': {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              'bg-zoom': {
                '0%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.05)' },
                '100%': { transform: 'scale(1)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0) translateX(0)' },
                '33%': { transform: 'translateY(-20px) translateX(15px)' },
                '66%': { transform: 'translateY(15px) translateX(-20px)' },
              }
            },
            animation: {
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'blob': 'blob 15s infinite',
              'blob-delayed': 'blob 15s infinite 5s',
              'bg-zoom': 'bg-zoom 30s ease-in-out infinite',
              'float': 'float 20s ease-in-out infinite',
            }
          }
        }
      }
    </script>

    <!-- Import Map for React and Libraries -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
    </script>

    <style>
      html { scroll-behavior: smooth; }
      body { background-color: #0f172a; color: #f8fafc; }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #84cc16; }
      
      /* Animación de carga para el Chat de Gemini */
      .typing-indicator span {
        display: inline-block;
        width: 6px;
        height: 6px;
        background-color: #84cc16;
        border-radius: 50%;
        margin: 0 2px;
        animation: typing 1.4s infinite both;
      }
      .typing-indicator span:nth-child(1) { animation-delay: 0s; }
      .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
      .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
    <link rel="preconnect" href="https://wsrv.nl">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Lock, Menu, X, Calendar, MapPin, Trophy, Bike, Target, Waves, 
            CircleDot, Users, Activity, Dribbble, Goal, Info, ExternalLink,
            Instagram, Mail, Phone, Clock, Fish, FileText, ArrowUp, Compass,
            MessageCircle, Send, Sparkles, Bot, Loader2, ChevronDown, Search,
            Trash2, Plus, Medal, LogOut
        } from 'lucide-react';

        // Optimiza imágenes externas (ibb.co, imgur) redimensionando y convirtiendo a WebP
        // vía wsrv.nl, un proxy de imágenes gratuito. No requiere subir nada de nuevo.
        const optimizeImg = (url, width = 400) => `https://wsrv.nl/?url=${encodeURIComponent(url)}&w=${width}&output=webp&q=80`;

        // --- GEMINI API INTEGRATION (SEGURO) ---
        // La API key ya NO está acá. Vive en Netlify (variable de entorno GEMINI_API_KEY)
        // y solo la usa la función serverless en netlify/functions/gemini-chat.js

        const fetchWithRetry = async (url, options, retries = 2) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        // Capturamos el error real de la función
                        throw new Error(`Error ${response.status}: ${errData.error || 'Error del servidor'}`);
                    }
                    return await response.json();
                } catch (e) {
                    // Si es un error de cliente (400, 403, 404) no reintentamos, cortamos de una.
                    if (e.message.includes('Error 40') || i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, 1000));
                }
            }
        };

        const callGeminiChat = async (history, systemPrompt) => {
            try {
                const data = await fetchWithRetry('/.netlify/functions/gemini-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history, systemPrompt })
                });
                return data.text || "Lo siento, tuve un problema al procesar tu solicitud.";
            } catch (error) {
                console.error("Detalle del error:", error);
                if (error.message.includes('Failed to fetch')) {
                    return "🔌 Error de conexión. Asegúrate de que el sitio esté publicado en Netlify.";
                }
                return `⚠️ Ups, algo falló: ${error.message}`;
            }
        };

        // COMPONENTE: Cabecera de Sección
        const SectionHeader = ({ title, children }) => (
            <div className="w-full bg-slate-800/80 backdrop-blur-md border-y border-white/5 py-8 mb-12 shadow-lg relative z-10">
                <div className="container mx-auto px-4 text-center flex flex-col items-center">
                    <h2 className="font-bebas text-4xl md:text-5xl text-white tracking-wider uppercase">{title}</h2>
                    <div className="w-20 h-1 bg-brand-accent rounded-full mx-auto mt-4"></div>
                    {children && <div className="mt-6 w-full">{children}</div>}
                </div>
            </div>
        );

        // COMPONENTE: Fondo Animado Interactivo (Parallax + CSS Blobs)
        const AbstractBackground = () => {
            const bgRef = useRef(null);
            const parallax1Ref = useRef(null);
            const parallax2Ref = useRef(null);

            const particles = React.useMemo(() => {
                return [...Array(15)].map((_, i) => ({
                    id: i,
                    width: Math.random() * 5 + 2,
                    top: Math.random() * 100,
                    left: Math.random() * 100,
                    animationDuration: Math.random() * 10 + 15,
                    animationDelay: Math.random() * -20,
                    opacity: Math.random() * 0.4 + 0.1
                }));
            }, []);

            useEffect(() => {
                let ticking = false;
                const handleScroll = () => {
                    if (ticking) return;
                    ticking = true;
                    requestAnimationFrame(() => {
                        const scrollY = window.scrollY;
                        if (bgRef.current) bgRef.current.style.transform = `translateY(${scrollY * 0.15}px)`;
                        if (parallax1Ref.current) parallax1Ref.current.style.transform = `translateY(${scrollY * -0.1}px)`;
                        if (parallax2Ref.current) parallax2Ref.current.style.transform = `translateY(${scrollY * 0.05}px)`;
                        ticking = false;
                    });
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
                    {particles.map(p => (
                        <div key={p.id} className="absolute rounded-full bg-white animate-float" style={{
                            width: `${p.width}px`, height: `${p.width}px`, top: `${p.top}%`, left: `${p.left}%`,
                            opacity: p.opacity, animationDuration: `${p.animationDuration}s`, animationDelay: `${p.animationDelay}s`
                        }}></div>
                    ))}
                    <div ref={parallax1Ref} className="absolute inset-0">
                        <div className="absolute top-[20%] left-[5%] w-[500px] h-[500px] bg-brand-accent/10 rounded-full blur-[80px] animate-blob"></div>
                    </div>
                    <div ref={parallax2Ref} className="absolute inset-0">
                        <div className="absolute top-[60%] right-[5%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[80px] animate-blob-delayed"></div>
                        <div className="absolute bottom-[0%] left-[30%] w-[400px] h-[400px] bg-purple-600/10 rounded-full blur-[80px] animate-blob" style={{ animationDelay: '2s' }}></div>
                    </div>
                    <div ref={bgRef} className="absolute -inset-[100%] opacity-[0.04]" style={{ backgroundImage: `radial-gradient(#fff 1px, transparent 1px)`, backgroundSize: '50px 50px' }}></div>
                </div>
            );
        };

        const Header = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [institutionalOpen, setInstitutionalOpen] = useState(false);
            const [mobileInstitutionalOpen, setMobileInstitutionalOpen] = useState(false);
            const institutionalRef = useRef(null);

            const navItems = [
                { label: 'INICIO', href: '#hero' },
                { label: 'SEDES', href: '#sedes' },
                { label: 'DISCIPLINAS', href: '#disciplinas' },
                { label: 'CRONOGRAMA', href: '#cronograma' },
                { label: 'RESULTADOS', href: '#resultados' },
                { label: 'REGLAMENTOS', href: '#reglamentos' },
                { label: 'TURISMO', href: '#turismo' },
            ];

            const institutionalItems = [
                { label: 'HISTORIA', href: '#historia' },
                { label: 'AUTORIDADES', href: '#autoridades' },
            ];

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (institutionalRef.current && !institutionalRef.current.contains(e.target)) {
                        setInstitutionalOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const handleNavClick = (e, href) => {
                if (href === '#' || href.startsWith('http')) return;
                e.preventDefault(); 
                const element = document.querySelector(href);
                if (element) {
                    const headerOffset = 80; 
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                    window.scrollTo({ top: offsetPosition, behavior: "smooth" });
                }
                setMobileMenuOpen(false); 
                setInstitutionalOpen(false);
                setMobileInstitutionalOpen(false);
            };

            return (
                <header className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-brand-dark/95 backdrop-blur-md shadow-lg border-b border-white/10' : 'bg-transparent'}`}>
                    <div className="container mx-auto px-4 md:px-6">
                        <div className="flex items-center justify-between py-2">
                            <a href="#hero" onClick={(e) => handleNavClick(e, '#hero')} className="py-2 z-50">
                                <img src={optimizeImg("https://i.ibb.co/cSdvg9qJ/LOGO-LETRA-BLANCA.png", 300)} alt="Logo" className="h-16 md:h-20 lg:h-[100px] w-auto object-contain hover:scale-105 transition-transform duration-300" />
                            </a>
                            <nav className="hidden lg:flex items-center gap-4 xl:gap-6">
                                {navItems.map((item) => (
                                    <a key={item.label} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className="text-[11px] xl:text-xs font-bold text-slate-300 hover:text-brand-accent transition-colors tracking-widest uppercase cursor-pointer">{item.label}</a>
                                ))}
                                <div className="relative" ref={institutionalRef}>
                                    <button onClick={() => setInstitutionalOpen(!institutionalOpen)} className="flex items-center gap-1 text-[11px] xl:text-xs font-bold text-slate-300 hover:text-brand-accent transition-colors tracking-widest uppercase cursor-pointer">
                                        INSTITUCIONAL
                                        <ChevronDown size={14} className={`transition-transform ${institutionalOpen ? 'rotate-180' : ''}`} />
                                    </button>
                                    {institutionalOpen && (
                                        <div className="absolute top-full right-0 mt-3 bg-slate-900 border border-white/10 rounded-xl shadow-2xl overflow-hidden min-w-[160px] animate-fade-in-up">
                                            {institutionalItems.map((item) => (
                                                <a key={item.label} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className="block px-5 py-3 text-[11px] font-bold text-slate-300 hover:text-brand-accent hover:bg-slate-800 transition-colors tracking-widest uppercase cursor-pointer">{item.label}</a>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </nav>
                            <button className="lg:hidden text-white z-50" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>{mobileMenuOpen ? <X size={28}/> : <Menu size={28}/>}</button>
                        </div>
                    </div>
                    {mobileMenuOpen && (
                        <div className="lg:hidden bg-brand-dark border-t border-white/10 absolute w-full shadow-2xl">
                            <div className="flex flex-col p-4 space-y-4">
                                {navItems.map((item) => (
                                    <a key={item.label} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className="font-medium text-slate-300 hover:text-brand-accent uppercase tracking-wider">{item.label}</a>
                                ))}
                                <div className="border-t border-white/5 pt-4">
                                    <button onClick={() => setMobileInstitutionalOpen(!mobileInstitutionalOpen)} className="flex items-center justify-between w-full font-medium text-slate-300 hover:text-brand-accent uppercase tracking-wider">
                                        Institucional
                                        <ChevronDown size={18} className={`transition-transform ${mobileInstitutionalOpen ? 'rotate-180' : ''}`} />
                                    </button>
                                    {mobileInstitutionalOpen && (
                                        <div className="flex flex-col gap-4 pl-4 mt-4">
                                            {institutionalItems.map((item) => (
                                                <a key={item.label} href={item.href} onClick={(e) => handleNavClick(e, item.href)} className="font-medium text-slate-400 hover:text-brand-accent uppercase tracking-wider text-sm">{item.label}</a>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </header>
            );
        };

        const Hero = () => {
            const [timeLeft, setTimeLeft] = useState({ días: 0, horas: 0, min: 0, seg: 0 });
            
            useEffect(() => {
                const calculateTimeLeft = () => {
                    const eventDate = new Date('2026-11-01T00:00:00').getTime();
                    const now = new Date().getTime();
                    const difference = eventDate - now;
                    if (difference > 0) {
                        return {
                            días: Math.floor(difference / (1000 * 60 * 60 * 24)),
                            horas: Math.floor((difference / (1000 * 60 * 60)) % 24),
                            min: Math.floor((difference / 1000 / 60) % 60),
                            seg: Math.floor((difference / 1000) % 60),
                        };
                    }
                    return { días: 0, horas: 0, min: 0, seg: 0 };
                };
                setTimeLeft(calculateTimeLeft());
                const timer = setInterval(calculateTimeLeft, 1000);
                return () => clearInterval(timer);
            }, []);

            return (
                <section id="hero" className="relative min-h-screen flex items-center justify-center pt-28 md:pt-20 overflow-hidden">
                    <div className="absolute inset-0 z-0 pointer-events-none">
                        <div className={`absolute inset-0 bg-[url('${optimizeImg("https://i.ibb.co/3y1BYXy3/190130171455g.jpg", 1600)}')] bg-cover bg-center opacity-90 animate-bg-zoom`}></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-brand-dark/60 to-brand-dark"></div>
                    </div>

                    <div className="container mx-auto px-4 z-10 flex flex-col md:flex-row items-center justify-between gap-8 md:gap-12 relative z-20">
                        <div className="flex-1 text-center md:text-left">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-brand-accent/30 bg-brand-accent/10 text-brand-accent mb-6 md:mb-8 animate-fade-in-up mx-auto md:mx-0">
                                <span className="w-2 h-2 rounded-full bg-brand-accent animate-pulse"></span>
                                <span className="text-xs font-bold uppercase tracking-wider shadow-sm">Evento Nacional</span>
                            </div>
                            
                            <h1 className="font-bebas text-5xl md:text-6xl lg:text-7xl text-white mb-4 md:mb-6 tracking-wide leading-none uppercase drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">
                                XXXVIII Olimpiadas Nacionales de Institutos de Vivienda
                            </h1>
                            <p className="font-bebas text-3xl md:text-4xl lg:text-5xl text-brand-accent mb-8 md:mb-12 tracking-widest uppercase drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">La Pampa 2026</p>
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl mx-auto md:mx-0 mb-8">
                                {Object.entries(timeLeft).map(([unit, value]) => (
                                    <div key={unit} className="bg-slate-900/60 backdrop-blur-md border border-white/10 p-4 rounded-xl flex flex-col items-center justify-center group hover:border-brand-accent/50 transition-colors shadow-lg">
                                        <span className="font-bebas text-4xl md:text-6xl text-white tabular-nums group-hover:text-brand-accent transition-colors mt-1 drop-shadow-md">{String(value).padStart(2, '0')}</span>
                                        <span className="text-xs text-slate-300 font-sans font-bold uppercase tracking-widest mt-1">{unit}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-4 text-slate-200 mb-8 font-sans font-medium">
                                <div className="flex items-center gap-2 bg-slate-900/70 px-5 py-3 rounded-full border border-white/10 backdrop-blur-md shadow-lg"><Calendar className="text-brand-accent w-5 h-5" /><span>1 - 6 Noviembre 2026</span></div>
                                <div className="flex items-center gap-2 bg-slate-900/70 px-5 py-3 rounded-full border border-white/10 backdrop-blur-md shadow-lg"><MapPin className="text-brand-accent w-5 h-5" /><span>Santa Rosa, La Pampa</span></div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-center justify-center md:justify-start gap-4 animate-fade-in-up delay-300">
                                <a 
                                    href="https://olimpicosipv.wnpower.host/Inscripciones/formulario_inscripcion" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="w-full sm:w-auto px-8 py-4 bg-brand-accent hover:bg-brand-accentHover text-brand-dark font-sans font-black rounded-xl transition-all transform hover:-translate-y-1 shadow-[0_0_30px_rgba(132,204,22,0.5)] flex items-center justify-center gap-2 uppercase tracking-wide text-center"
                                >
                                    Inscripción a Evento
                                </a>
                            </div>
                        </div>
                        <div className="flex-1 w-full max-w-xs sm:max-w-sm md:max-w-md lg:max-w-xl relative flex justify-center md:justify-end animate-fade-in-up delay-200 mt-8 md:mt-0">
                            <img src={optimizeImg("https://i.ibb.co/0pCNLJp8/PAMPITO-FINAL-SIN-FONDO-2.png", 700)} alt="Mascota Oficial Pampito" className="relative w-full h-auto object-contain drop-shadow-[0_10px_30px_rgba(0,0,0,0.8)] hover:scale-105 transition-transform duration-500 z-10" />
                        </div>
                    </div>
                </section>
            );
        };

        const Historia = () => {
            const images = [
                'https://i.ibb.co/MkdqT6YC/20260612124354886-0001.jpg', 
                'https://i.ibb.co/60325JGr/20260612124440582-0001.jpg', 
                'https://i.ibb.co/2YZ90c0L/20260612124746539-0001.jpg',
                'https://i.ibb.co/CpG29thW/20260612125312197.jpg',
                'https://i.ibb.co/h1RyTbBX/20260612125528745-0001.jpg',
                'https://i.ibb.co/rK0XKDFG/202606121250345233-001.png'
            ];
            const [curr, setCurr] = useState(0);
            
            useEffect(() => { 
                const i = setInterval(() => setCurr(p => (p + 1) % images.length), 4000); 
                return () => clearInterval(i); 
            }, []);
            
            return (
                <section id="historia" className="pt-12 relative z-10">
                    <SectionHeader title="Nuestra Historia" />
                    <div className="container mx-auto px-4 mb-24">
                        <div className="grid lg:grid-cols-2 gap-12 items-center">
                            <div className="relative h-[400px] rounded-3xl overflow-hidden shadow-2xl border border-white/10 group">
                                {images.map((img, i) => (
                                    <img key={i} src={optimizeImg(img, 800)} alt="Historia Olimpiadas" className={`absolute inset-0 w-full h-full object-cover transition-all duration-1000 transform group-hover:scale-105 ${i === curr ? 'opacity-100' : 'opacity-0'}`} />
                                ))}
                                <div className="absolute bottom-4 left-0 right-0 z-20 flex justify-center gap-2">
                                    {images.map((_, idx) => (

        const scheduleData = [
            { day: 'Domingo', date: '01 Nov', activities: [{ title: 'Acreditaciones de delegaciones (A Confirmar)' }, { title: 'Acto inaugural (A Confirmar)' }, { title: 'Cena de bienvenida (A Confirmar)' }] },

        // --- MÓDULO DE RESULTADOS ---
        const RESULTADOS_API = '/.netlify/functions/resultados';
        const slugify = (str) => str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        const eventDays = [
            { label: 'Domingo 1 Nov', value: '2026-11-01' },
            { label: 'Lunes 2 Nov', value: '2026-11-02' },
            { label: 'Martes 3 Nov', value: '2026-11-03' },
            { label: 'Miércoles 4 Nov', value: '2026-11-04' },
            { label: 'Jueves 5 Nov', value: '2026-11-05' },
            { label: 'Viernes 6 Nov', value: '2026-11-06' },

        const dayLabel = (value) => eventDays.find(d => d.value === value)?.label || value;
        const medalStyles = {
            1: { label: '1°', color: 'text-yellow-400', border: 'border-yellow-400/40' },
            2: { label: '2°', color: 'text-slate-300', border: 'border-slate-300/40' },

        };

        // Disciplinas con carga de partidos (marcador equipo A vs equipo B)
        const DISCIPLINAS_PARTIDOS = ['Fútbol (5 y 8)', 'Básquet (3x3 y 5x5)', 'Voley', 'Tenis'];
        const provinciasArgentinas = [
            'Buenos Aires', 'CABA', 'Catamarca', 'Chaco', 'Chubut', 'Córdoba', 'Corrientes',
            'Entre Ríos', 'Formosa', 'Jujuy', 'La Pampa', 'La Rioja', 'Mendoza', 'Misiones',
            'Neuquén', 'Río Negro', 'Salta', 'San Juan', 'San Luis', 'Santa Cruz', 'Santa Fe',
            'Santiago del Estero', 'Tierra del Fuego', 'Tucumán'
        ];

        // Disciplinas con carga de tiempo + provincia por competidor
        const DISCIPLINAS_TIEMPO = ['Running', 'MTB', 'Ciclismo Calle', 'Natación', 'Carrera de Obstáculos'];

        const getResultType = (disciplineName) => {
            if (DISCIPLINAS_PARTIDOS.includes(disciplineName)) return 'partidos';
            if (DISCIPLINAS_TIEMPO.includes(disciplineName)) return 'tiempo';
            return 'podio';
        };

        const emptyMatch = () => ({ id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()), stage: '', teamA: '', scoreA: '', teamB: '', scoreB: '' });

        const Resultados = () => {
            const [resultados, setResultados] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [dayFilter, setDayFilter] = useState('todos');

            const cargarResultados = async () => {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch(RESULTADOS_API);
                    if (!res.ok) throw new Error('No se pudieron cargar los resultados');
                    const data = await res.json();
                    data.sort((a, b) => (a.day + a.discipline + a.category).localeCompare(b.day + b.discipline + b.category));
                    setResultados(data);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { cargarResultados(); }, []);

            const filtrados = dayFilter === 'todos' ? resultados : resultados.filter(r => r.day === dayFilter);

            return (
                <section id="resultados" className="relative z-10">
                    <SectionHeader title="Resultados">
                        <p className="font-sans text-slate-400 max-w-2xl mx-auto">Ganadores y marcadores de cada disciplina, día por día</p>

                    <div className="container mx-auto px-4 mb-24">
                        <div className="flex flex-wrap justify-center gap-2 mb-10">
                            <button onClick={() => setDayFilter('todos')} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wide border transition-colors ${dayFilter === 'todos' ? 'bg-brand-accent text-brand-dark border-brand-accent' : 'border-white/10 text-slate-400 hover:border-brand-accent/50'}`}>Todos</button>
                            {eventDays.map(d => (
                                <button key={d.value} onClick={() => setDayFilter(d.value)} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wide border transition-colors ${dayFilter === d.value ? 'bg-brand-accent text-brand-dark border-brand-accent' : 'border-white/10 text-slate-400 hover:border-brand-accent/50'}`}>{d.label}</button>
                            ))}
                        </div>

                        {loading && <p className="text-center text-slate-500 font-sans">Cargando resultados...</p>}
                        {error && <p className="text-center text-red-400 font-sans">{error}</p>}
                        {!loading && !error && filtrados.length === 0 && (
                            <p className="text-center text-slate-500 font-sans">Todavía no hay resultados cargados{dayFilter !== 'todos' ? ' para este día' : ''}.</p>
                        )}

                            {filtrados.map((r) => (
                                <div key={r.key} className="bg-slate-800/50 border border-white/5 rounded-2xl p-6 hover:border-brand-accent/30 transition-colors shadow-lg">

                                        <h3 className="font-bebas text-2xl text-white tracking-wide">{r.discipline}</h3>
                                        <Trophy className="text-brand-accent/60 w-5 h-5 flex-shrink-0" />
                                    </div>
                                    <p className="font-sans text-xs text-slate-500 uppercase tracking-widest mb-4">{r.category} · {dayLabel(r.day)}</p>

                                    {/* Tipo: partidos */}
                                    {r.type === 'partidos' && (
                                        <div className="space-y-2">
                                            {(r.matches || []).map((m) => (
                                                <div key={m.id} className="border border-white/5 rounded-lg px-3 py-2 bg-slate-900/40">
                                                    {m.stage && <p className="text-[10px] text-brand-accent uppercase tracking-widest mb-1 font-bold">{m.stage}</p>}
                                                    <div className="flex items-center justify-between font-sans text-sm text-slate-200">
                                                        <span className="truncate">{m.teamA}</span>
                                                        <span className="font-bebas text-lg text-white px-2 whitespace-nowrap">{m.scoreA} - {m.scoreB}</span>
                                                        <span className="truncate text-right">{m.teamB}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Tipo: tiempo */}
                                    {r.type === 'tiempo' && (
                                        <div className="space-y-2">
                                            {(r.winners || []).filter(w => w.name).map((w) => (
                                                <div key={w.position} className={`flex items-center gap-3 border rounded-lg px-3 py-2 ${medalStyles[w.position]?.border || 'border-white/5'}`}>
                                                    <span className={`font-bebas text-lg w-8 flex-shrink-0 ${medalStyles[w.position]?.color || 'text-slate-400'}`}>{medalStyles[w.position]?.label || w.position}</span>
                                                    <div className="flex-grow min-w-0">
                                                        <p className="font-sans text-sm text-slate-200 truncate">{w.name} <span className="text-slate-500">· {w.provincia}</span></p>
                                                    </div>
                                                    <span className="font-mono text-sm text-brand-accent whitespace-nowrap">{w.time}</span>
                                                </div>
                                            ))}
                                            {r.linkCompleto && (
                                                <a href={r.linkCompleto} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-xs text-slate-400 hover:text-brand-accent transition-colors mt-2 font-sans">
                                                    <ExternalLink size={14} /> Ver todos los tiempos
                                                </a>
                                            )}
                                        </div>
                                    )}

                                    {/* Tipo: podio simple */}
                                    {r.type !== 'partidos' && r.type !== 'tiempo' && (
                                        <div className="space-y-2">
                                            {(r.winners || []).filter(w => w.provincia).map((w) => (
                                                <div key={w.position} className={`flex items-center gap-3 border rounded-lg px-3 py-2 ${medalStyles[w.position]?.border || 'border-white/5'}`}>
                                                    <span className={`font-bebas text-lg w-8 flex-shrink-0 ${medalStyles[w.position]?.color || 'text-slate-400'}`}>{medalStyles[w.position]?.label || w.position}</span>
                                                    <span className="font-sans text-sm text-slate-200 truncate">{w.provincia}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const AdminResultados = () => {
            const [token, setToken] = useState(() => sessionStorage.getItem('olimpiadas_admin_token') || '');
            const [passwordInput, setPasswordInput] = useState('');
            const [authError, setAuthError] = useState('');
            const [resultados, setResultados] = useState([]);
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const [formError, setFormError] = useState('');

            const [form, setForm] = useState({
                day: eventDays[0].value,
                discipline: disciplinesData[0].name,
                category: disciplinesData[0].categories[0],
                // podio simple
                first: '', second: '', third: '',
                // tiempo
                t1: { name: '', provincia: '', time: '' },
                t2: { name: '', provincia: '', time: '' },
                t3: { name: '', provincia: '', time: '' },
                linkCompleto: '',
                // partidos
                matches: [emptyMatch()],
            });

            const discipline = disciplinesData.find(d => d.name === form.discipline) || disciplinesData[0];
            const resultType = getResultType(form.discipline);

            const cargarResultados = async () => {
                setLoading(true);
                try {
                    const res = await fetch(RESULTADOS_API);
                    const data = await res.json();
                    setResultados(data);
                } catch (e) {
                    setFormError('No se pudieron cargar los resultados existentes.');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { if (token) cargarResultados(); }, [token]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    const res = await fetch(RESULTADOS_API, { headers: { 'X-Admin-Token': passwordInput } });
                    if (res.status === 401) { setAuthError('Contraseña incorrecta.'); return; }
                    sessionStorage.setItem('olimpiadas_admin_token', passwordInput);
                    setToken(passwordInput);
                } catch (e) {
                    setAuthError('Error de conexión.');
                }
            };

            const handleLogout = () => {
                sessionStorage.removeItem('olimpiadas_admin_token');
                setToken('');
            };

            const updateMatch = (id, field, value) => {
                setForm(f => ({ ...f, matches: f.matches.map(m => m.id === id ? { ...m, [field]: value } : m) }));
            };
            const addMatch = () => setForm(f => ({ ...f, matches: [...f.matches, emptyMatch()] }));
            const removeMatch = (id) => setForm(f => ({ ...f, matches: f.matches.filter(m => m.id !== id) }));

            const resetResultFields = () => setForm(f => ({
                ...f, first: '', second: '', third: '',
                t1: { name: '', provincia: '', time: '' }, t2: { name: '', provincia: '', time: '' }, t3: { name: '', provincia: '', time: '' },
                linkCompleto: '', matches: [emptyMatch()]
            }));

            const handleSubmit = async (e) => {
                e.preventDefault();
                setFormError('');

                const key = `${form.day}_${slugify(form.discipline)}_${slugify(form.category)}`;
                let payload = { key, day: form.day, discipline: form.discipline, category: form.category, type: resultType };

                if (resultType === 'partidos') {
                    const validMatches = form.matches.filter(m => m.teamA.trim() && m.teamB.trim() && m.scoreA !== '' && m.scoreB !== '');
                    if (validMatches.length === 0) { setFormError('Cargá al menos un partido completo.'); return; }
                    payload.matches = validMatches.map(({ id, ...rest }) => rest).map((m, i) => ({ ...m, id: i }));
                } else if (resultType === 'tiempo') {
                    if (!form.t1.name.trim() || !form.t1.time.trim()) { setFormError('El 1° puesto necesita al menos nombre y tiempo.'); return; }
                    payload.winners = [
                        { position: 1, name: form.t1.name.trim(), provincia: form.t1.provincia.trim(), time: form.t1.time.trim() },
                        { position: 2, name: form.t2.name.trim(), provincia: form.t2.provincia.trim(), time: form.t2.time.trim() },
                        { position: 3, name: form.t3.name.trim(), provincia: form.t3.provincia.trim(), time: form.t3.time.trim() },
                    ];
                    payload.linkCompleto = form.linkCompleto.trim();
                } else {
                    if (!form.first.trim()) { setFormError('El 1° puesto es obligatorio.'); return; }
                    payload.winners = [
                        { position: 1, provincia: form.first.trim() },
                        { position: 2, provincia: form.second.trim() },
                        { position: 3, provincia: form.third.trim() },
                    ];
                }

                setSaving(true);
                try {
                    const res = await fetch(RESULTADOS_API, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                        body: JSON.stringify(payload)
                    });
                    if (res.status === 401) { setFormError('Sesión vencida, volvé a iniciar sesión.'); handleLogout(); return; }
                    if (!res.ok) throw new Error('Error al guardar');
                    resetResultFields();
                    cargarResultados();
                } catch (e) {
                    setFormError(e.message);
                } finally {
                    setSaving(false);
                }
            };

            const handleDelete = async (key) => {
                if (!confirm('¿Eliminar este resultado?')) return;
                try {
                    await fetch(RESULTADOS_API, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
                        body: JSON.stringify({ key })
                    });
                    cargarResultados();
                } catch (e) {
                    setFormError('No se pudo eliminar.');
                }
            };

            if (!token) {
                return (
                    <section id="admin" className="relative z-10 py-24">
                        <div className="container mx-auto px-4 max-w-sm">
                            <form onSubmit={handleLogin} className="bg-slate-800/50 border border-white/10 rounded-2xl p-8 flex flex-col items-center gap-4 shadow-lg">
                                <Lock className="text-brand-accent w-8 h-8" />
                                <h3 className="font-bebas text-2xl text-white tracking-wide">Panel de Administración</h3>
                                <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="Contraseña" className="w-full bg-slate-900 border border-white/10 rounded-full py-3 px-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brand-accent font-sans text-sm text-center" />
                                {authError && <p className="text-red-400 text-xs font-sans">{authError}</p>}
                                <button type="submit" className="w-full py-3 bg-brand-accent hover:bg-brand-accentHover text-brand-dark font-sans font-black rounded-full uppercase tracking-wide text-sm">Ingresar</button>
                            </form>
                        </div>
                    </section>
                );
            }

            return (
                <section id="admin" className="relative z-10 py-24">
                    <div className="container mx-auto px-4 max-w-3xl">
                        <div className="flex items-center justify-between mb-8">
                            <h3 className="font-bebas text-3xl text-white tracking-wide">Cargar Resultado</h3>
                            <button onClick={handleLogout} className="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-brand-accent uppercase tracking-wide"><LogOut size={16} /> Salir</button>
                        </div>
                        <form onSubmit={handleSubmit} className="bg-slate-800/50 border border-white/10 rounded-2xl p-8 flex flex-col gap-4 mb-6 shadow-lg">
                            <datalist id="lista-provincias">
                                {provinciasArgentinas.map(p => <option key={p} value={p} />)}
                            </datalist>
                            <div className="grid md:grid-cols-2 gap-4">
                                <select value={form.day} onChange={(e) => setForm(f => ({ ...f, day: e.target.value }))} className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 font-sans text-sm">
                                    {eventDays.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
                                </select>
                                <select value={form.discipline} onChange={(e) => { const disc = disciplinesData.find(d => d.name === e.target.value); setForm(f => ({ ...f, discipline: e.target.value, category: disc.categories[0] })); }} className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 font-sans text-sm">
                                    {disciplinesData.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
                                </select>
                                <select value={form.category} onChange={(e) => setForm(f => ({ ...f, category: e.target.value }))} className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 font-sans text-sm md:col-span-2">
                                    {discipline.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>

                            {/* FORM: Partidos (fútbol, básquet, voley, tenis) */}
                            {resultType === 'partidos' && (
                                <div className="flex flex-col gap-3">
                                    <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Partidos del día</p>
                                    {form.matches.map((m, idx) => (
                                        <div key={m.id} className="bg-slate-900/50 border border-white/5 rounded-lg p-4 flex flex-col gap-2">
                                            <div className="flex items-center justify-between">
                                                <input value={m.stage} onChange={(e) => updateMatch(m.id, 'stage', e.target.value)} placeholder="Etapa (ej. Final, Fase de grupos)" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-xs flex-grow" />
                                                {form.matches.length > 1 && (
                                                    <button type="button" onClick={() => removeMatch(m.id)} className="text-slate-500 hover:text-red-400 p-2 ml-2"><Trash2 size={16} /></button>
                                                )}
                                            </div>
                                            <div className="grid grid-cols-5 gap-2 items-center">
                                                <input value={m.teamA} onChange={(e) => updateMatch(m.id, 'teamA', e.target.value)} placeholder="Provincia A" list="lista-provincias" className="col-span-2 bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                                <input type="number" value={m.scoreA} onChange={(e) => updateMatch(m.id, 'scoreA', e.target.value)} placeholder="0" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-2 text-slate-200 placeholder-slate-500 font-sans text-sm text-center" />
                                                <input type="number" value={m.scoreB} onChange={(e) => updateMatch(m.id, 'scoreB', e.target.value)} placeholder="0" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-2 text-slate-200 placeholder-slate-500 font-sans text-sm text-center" />
                                                <input value={m.teamB} onChange={(e) => updateMatch(m.id, 'teamB', e.target.value)} placeholder="Provincia B" list="lista-provincias" className="col-span-2 bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm md:col-span-1" />
                                            </div>
                                        </div>
                                    ))}
                                    <button type="button" onClick={addMatch} className="self-start flex items-center gap-2 text-xs font-bold text-brand-accent hover:text-brand-accentHover uppercase tracking-wide"><Plus size={14} /> Agregar otro partido</button>
                                </div>
                            )}

                            {/* FORM: Tiempo (running, mtb, ciclismo, natación, obstáculos) */}
                            {resultType === 'tiempo' && (
                                <div className="flex flex-col gap-3">
                                    <p className="text-xs text-slate-500 uppercase tracking-widest font-bold">Podio (1°, 2° y 3°)</p>
                                    {[1, 2, 3].map(pos => (
                                        <div key={pos} className="grid grid-cols-4 gap-2 items-center">
                                            <span className="font-bebas text-lg text-brand-accent">{pos}°</span>
                                            <input value={form[`t${pos}`].name} onChange={(e) => setForm(f => ({ ...f, [`t${pos}`]: { ...f[`t${pos}`], name: e.target.value } }))} placeholder="Nombre y apellido" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                            <input value={form[`t${pos}`].provincia} onChange={(e) => setForm(f => ({ ...f, [`t${pos}`]: { ...f[`t${pos}`], provincia: e.target.value } }))} placeholder="Provincia" list="lista-provincias" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                            <input value={form[`t${pos}`].time} onChange={(e) => setForm(f => ({ ...f, [`t${pos}`]: { ...f[`t${pos}`], time: e.target.value } }))} placeholder="Tiempo (ej. 00:24:31)" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                        </div>
                                    ))}
                                    <input value={form.linkCompleto} onChange={(e) => setForm(f => ({ ...f, linkCompleto: e.target.value }))} placeholder="Link a tiempos completos (opcional)" className="bg-slate-900 border border-white/10 rounded-lg py-2 px-3 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                </div>
                            )}

                            {/* FORM: Podio simple (resto de disciplinas) */}
                            {resultType === 'podio' && (
                                <div className="grid md:grid-cols-2 gap-4">
                                    <input value={form.first} onChange={(e) => setForm(f => ({ ...f, first: e.target.value }))} placeholder="1° puesto — Provincia" list="lista-provincias" className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 placeholder-slate-500 font-sans text-sm md:col-span-2" />
                                    <input value={form.second} onChange={(e) => setForm(f => ({ ...f, second: e.target.value }))} placeholder="2° puesto — Provincia (opcional)" list="lista-provincias" className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                    <input value={form.third} onChange={(e) => setForm(f => ({ ...f, third: e.target.value }))} placeholder="3° puesto — Provincia (opcional)" list="lista-provincias" className="bg-slate-900 border border-white/10 rounded-lg py-3 px-4 text-slate-200 placeholder-slate-500 font-sans text-sm" />
                                </div>
                            )}

                            {formError && <p className="text-red-400 text-xs font-sans">{formError}</p>}
                            <button type="submit" disabled={saving} className="flex items-center justify-center gap-2 py-3 bg-brand-accent hover:bg-brand-accentHover disabled:opacity-50 text-brand-dark font-sans font-black rounded-full uppercase tracking-wide text-sm"><Plus size={18} /> {saving ? 'Guardando...' : 'Guardar Resultado'}</button>
                        </form>

                        <h4 className="font-bebas text-xl text-white tracking-wide mb-4">Resultados cargados ({resultados.length})</h4>
                        {loading ? <p className="text-slate-500 font-sans text-sm">Cargando...</p> : (
                            <div className="space-y-2">
                                {resultados.map(r => (
                                    <div key={r.key} className="flex items-center justify-between bg-slate-900/60 border border-white/5 rounded-lg px-4 py-3">
                                        <div className="font-sans text-sm text-slate-300">
                                            <span className="font-bold text-white">{r.discipline}</span> · {r.category} · {dayLabel(r.day)}
                                            {r.type === 'partidos' && <span className="text-slate-500"> — {(r.matches || []).length} partido(s)</span>}
                                            {r.type === 'tiempo' && <span className="text-slate-500"> — 1°: {r.winners?.find(w=>w.position===1)?.name || '-'}</span>}
                                            {r.type !== 'partidos' && r.type !== 'tiempo' && <span className="text-slate-500"> — 1°: {r.winners?.find(w=>w.position===1)?.provincia || '-'}</span>}
                                        </div>
                                        <button onClick={() => handleDelete(r.key)} className="text-slate-500 hover:text-red-400 p-2"><Trash2 size={16} /></button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        const Rules = () => {
            return (
                <section id="reglamentos" className="relative z-10">
                    <SectionHeader title="Reglamentos Oficiales">
                        <p className="font-sans text-slate-400 max-w-2xl mx-auto">Toda la documentación, bases, condiciones y reglas para participar de las Olimpiadas 2026.</p>
                    </SectionHeader>
                    <div className="container mx-auto px-4 mb-24">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-gradient-to-br from-slate-900 to-slate-800 border-2 border-brand-accent/30 hover:border-brand-accent rounded-3xl p-8 md:p-12 flex flex-col items-center text-center shadow-[0_0_40px_rgba(132,204,22,0.1)] transition-all duration-500 relative overflow-hidden group">
                                <div className="absolute -right-10 -top-10 text-brand-accent/5 group-hover:text-brand-accent/10 transition-colors duration-700 transform group-hover:scale-110 group-hover:rotate-12 pointer-events-none">
                                    <FileText size={250} />
                                </div>
                                
                                <div className="w-20 h-20 bg-brand-accent/10 text-brand-accent rounded-2xl flex items-center justify-center mb-8 relative z-10 border border-brand-accent/20 group-hover:bg-brand-accent group-hover:text-brand-dark transition-colors duration-500">
                                    <FileText size={40} />
                                </div>
                                
                                <h3 className="font-bebas text-4xl md:text-5xl text-white mb-4 relative z-10 tracking-wide">Carpeta de Reglamentos</h3>
                                
                                <p className="font-sans text-slate-300 text-lg mb-10 max-w-2xl mx-auto relative z-10 leading-relaxed">
                                    Accedé a nuestra carpeta compartida oficial para leer o descargar el <strong className="text-white">Reglamento General</strong> y los <strong className="text-white">Reglamentos Específicos</strong> de cada una de las disciplinas deportivas de esta edición.
                                </p>
                                
                                <a href="https://drive.google.com/drive/folders/1oOfipr-_JcgXhGb3te9ro3Km5GGkURfm?usp=sharing" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-3 bg-brand-accent hover:bg-brand-accentHover text-brand-dark font-sans font-black text-lg py-5 px-8 md:px-12 rounded-xl transition-all shadow-[0_0_20px_rgba(132,204,22,0.3)] hover:shadow-[0_0_30px_rgba(132,204,22,0.5)] transform hover:-translate-y-1 relative z-10">
                                    <ExternalLink size={24} />
                                    <span>ACCEDER A LA CARPETA</span>
                                </a>
                                
                                <div className="mt-8 flex items-center gap-2 font-sans text-sm text-slate-500 relative z-10 bg-slate-950/50 py-2 px-5 rounded-full border border-white/5">
                                    <Info size={16} className="text-brand-accent" />
                                    <span>Se abrirá una nueva pestaña hacia Google Drive</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const tourismData = [
            { name: 'Parque Recreativo Laguna Don Tomás', location: 'Santa Rosa', description: 'En el corazón de la capital. Ideal para caminatas, deportes acuáticos, picnics y disfrutar de los hermosos atardeceres pampeanos.', link: 'https://www.santarosa.gob.ar/parque-laguna-don-tomas-hidropedales-el-salitrero-un-cielo-iluminado-musica-y-mas-de-12-000-personas-en-la-inauguracion-de-las-obras-integrales/', image: ['https://i.ibb.co/VptFYQRk/Whats-App-Image-2025-12-28-at-23-13-53-1-800x449-jpeg.webp', 'https://i.ibb.co/s9Bwn43f/Whats-App-Image-2025-12-26-at-12-40-08.jpg', 'https://i.ibb.co/hJqFg1s0/eb79523c27d555b5a4b896ebc396783f.jpg', 'https://i.ibb.co/VpmJnJHm/2384.jpg'] },
            { name: 'Reserva Natural Parque Luro', location: 'A 35 km de Santa Rosa', description: 'Santuario natural que alberga el histórico Castillo, senderos interpretativos y una gran diversidad de flora y fauna autóctona.', link: 'https://turismo.lapampa.gob.ar/visitas-a-la-reserva-natural-parque-luro.html', image: ['https://i.ibb.co/gZPsg8dJ/museo-el-castillo.jpg', 'https://i.ibb.co/bg1Hk8NH/49b90ac3-2dff-4e9d-bf78-b9cf8ada0c37.jpg', 'https://i.ibb.co/Y7QxGsfs/da33da7e-7421-42c7-ba8c-6755b87ccc37.jpg'] },

            { name: 'Casino Club', location: 'Santa Rosa', description: 'El mayor centro de entretenimiento de la provincia, con espectáculos en vivo, slots, mesas de juego y excelente gastronomía.', link: 'https://www.casino-club.com.ar/lp-santarosa.html', image: ['https://i.ibb.co/xSJXwmmT/casino-club-santa-rosa.jpg', 'https://i.ibb.co/N6HW14th/int-sr.jpg', 'https://i.ibb.co/CdhCJg4/sr2.jpg'] },
            { name: 'Parque Lineal Santa Rosa', location: 'Santa Rosa', description: 'Un extenso y moderno corredor verde ideal para el esparcimiento, actividades recreativas y paseos en bicicleta o caminando.', link: 'https://www.youtube.com/watch?v=OMOfX3LD86o&t=24s', image: ['https://i.ibb.co/j95kYf3K/292780.jpg', 'https://i.ibb.co/391CKnRK/Sin-t-tulo.png', 'https://i.ibb.co/hR9V5Gyx/Whats-App-Image-2025-12-11-at-12-03-42.jpg'] },
            { name: 'Parque Nacional Lihué Calel', location: 'A 230 km de Santa Rosa', description: 'Conocido como las "Sierras de la Vida". Un oasis geológico y biológico único con arte rupestre y paisajes imponentes.', link: 'https://pnlihuecalel.com/', image: ['https://i.ibb.co/XfFnnZDN/3577-img.jpg', 'https://i.ibb.co/XxSKMmXG/Lihue-Calel-02.jpg', 'https://i.ibb.co/xSMLdQp2/5e8ac552-9298-43ba-868f-96c5258dd481.jpg'] }
        ];

        const TourismCard = ({ item }) => {
            const images = Array.isArray(item.image) ? item.image : [item.image];
            const [currentImage, setCurrentImage] = useState(0);

            useEffect(() => {
                if (images.length > 1) {
                    const interval = setInterval(() => {
                        setCurrentImage((prev) => (prev + 1) % images.length);
                    }, 3500); 
                    return () => clearInterval(interval);
                }
            }, [images.length]);

            const CardWrapper = item.link ? 'a' : 'div';
            const linkProps = item.link ? { href: item.link, target: "_blank", rel: "noopener noreferrer" } : {};

            return (
                <CardWrapper {...linkProps} className={`group bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden hover:border-brand-accent/50 transition-all duration-300 shadow-lg hover:shadow-[0_0_20px_rgba(132,204,22,0.15)] flex flex-col ${item.link ? 'cursor-pointer' : ''}`}>
                    <div className="h-56 overflow-hidden relative">
                        <div className="absolute inset-0 bg-slate-900/30 group-hover:bg-transparent transition-colors z-10 duration-500 pointer-events-none"></div>
                        {images.map((img, idx) => (
                            <img key={idx} src={optimizeImg(img, 700)} alt={`${item.name} - ${idx + 1}`} loading="lazy" className={`absolute inset-0 w-full h-full object-cover transform group-hover:scale-110 transition-all duration-1000 ease-in-out ${idx === currentImage ? 'opacity-100 z-0' : 'opacity-0 -z-10'}`} />
                        ))}
                        {images.length > 1 && (
                            <div className="absolute bottom-3 left-0 right-0 z-20 flex justify-center gap-1.5">
                                {images.map((_, idx) => (
                                    <div key={idx} className={`h-1.5 rounded-full transition-all duration-300 ${idx === currentImage ? 'bg-brand-accent w-4' : 'bg-white/50 w-1.5'}`}></div>
                                ))}
                            </div>
                        )}
                        <div className="absolute top-4 right-4 z-20 bg-slate-900/80 backdrop-blur-sm border border-white/10 px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-xl">
                            <MapPin size={12} className="text-brand-accent" />
                            <span className="font-sans text-xs font-semibold text-slate-200">{item.location}</span>
                        </div>
                    </div>
                    <div className="p-6 flex-grow flex flex-col bg-slate-900 z-20 relative">
                        <div className="flex justify-between items-start mb-3">
                            <h3 className="font-bebas text-2xl text-white group-hover:text-brand-accent transition-colors leading-tight tracking-wide">{item.name}</h3>
                            {item.link && <ExternalLink size={18} className="text-slate-500 group-hover:text-brand-accent transition-colors flex-shrink-0 ml-2" />}
                        </div>
                        <p className="font-sans text-slate-400 text-sm leading-relaxed flex-grow">{item.description}</p>
                    </div>
                </CardWrapper>
            );
        };

        const TourismPlanner = () => {
            const [prompt, setPrompt] = useState("");
            const [plan, setPlan] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleGeneratePlan = async () => {
                if (!prompt.trim()) return;
                setLoading(true);
                
                const systemPrompt = `Eres un experto guía turístico de La Pampa. Los atractivos principales son: ${tourismData.map(t => t.name + " (" + t.location + ")").join(", ")}. Basado en las preferencias de tiempo y gusto del usuario, sugiérele un breve plan ideal en 2 o 3 viñetas cortas, mencionando al menos un atractivo de la lista o cercano a Santa Rosa. Usa un tono entusiasta y emojis. Formato: responde directamente con el plan en texto plano amigable.`;
                
                const history = [{ role: 'user', parts: [{ text: prompt }] }];
                const response = await callGeminiChat(history, systemPrompt);
                
                setPlan(response);
                setLoading(false);
            };

            return (
                <div className="bg-gradient-to-r from-slate-900 to-slate-800 rounded-2xl border border-brand-accent/20 p-6 md:p-8 mb-16 shadow-[0_0_30px_rgba(132,204,22,0.1)] relative overflow-hidden group">
                    <div className="absolute -top-10 -right-10 text-brand-accent/10 group-hover:text-brand-accent/20 transition-colors pointer-events-none transform rotate-12">
                        <Compass size={200} />
                    </div>
                    <div className="relative z-10 flex flex-col md:flex-row items-center gap-8">
                        <div className="flex-1 w-full">
                            <h3 className="font-bebas text-3xl md:text-4xl text-white mb-2 flex items-center gap-2">
                                <Sparkles className="text-brand-accent" size={28} /> Generador de Itinerario IA
                            </h3>
                            <p className="text-slate-400 font-sans mb-4 text-sm md:text-base">
                                ¿No sabes qué visitar? Cuéntanos cuánto tiempo tienes (ej. "tengo la tarde del martes libre") y qué te gusta (ej. "naturaleza", "lugares históricos", "descansar"), y nuestra IA te armará un plan a medida.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Ej: Tengo 3 horas libres y busco naturaleza..." 
                                    value={prompt}
                                    onChange={(e) => setPrompt(e.target.value)}
                                    className="flex-1 bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brand-accent placeholder-slate-600 transition-colors"
                                    onKeyDown={(e) => e.key === 'Enter' && handleGeneratePlan()}
                                />
                                <button 
                                    onClick={handleGeneratePlan}
                                    disabled={loading || !prompt.trim()}
                                    className="bg-brand-accent hover:bg-brand-accentHover disabled:opacity-50 disabled:cursor-not-allowed text-brand-dark font-sans font-bold px-6 py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg"
                                >
                                    {loading ? <Loader2 size={20} className="animate-spin" /> : <Sparkles size={20} />}
                                    ✨ SUGERIR PLAN
                                </button>
                            </div>
                        </div>
                        {plan && (
                            <div className="flex-1 w-full bg-slate-950/50 backdrop-blur border border-brand-accent/30 p-5 rounded-xl animate-fade-in-up shadow-inner text-sm text-slate-300 font-sans whitespace-pre-line leading-relaxed">
                                {plan}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const Tourism = () => {
            return (
                <section id="turismo" className="relative z-10">
                    <SectionHeader title="Turismo y Recreación">
                        <p className="font-sans text-slate-400 max-w-2xl mx-auto mb-6">Descubrí los atractivos imperdibles que La Pampa tiene para ofrecerte en tus tiempos libres.</p>
                        <a href="https://turismo.lapampa.gob.ar/" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-brand-accent/50 text-white font-sans font-semibold py-3 px-6 rounded-full transition-all duration-300 group shadow-md">
                            <Compass size={18} className="text-brand-accent group-hover:animate-spin-slow" />
                            Visitar Portal Oficial de Turismo
                            <ExternalLink size={14} className="ml-1 opacity-50 group-hover:opacity-100" />
                        </a>
                    </SectionHeader>
                    <div className="container mx-auto px-4 mb-24">
                        <TourismPlanner />
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {tourismData.map((item, index) => (
                                <TourismCard key={index} item={item} />

                </section>
            );
        };

        const authoritiesData = [
            { name: 'Ing. Walter Vargas', role: 'Presidente', image: 'https://i.ibb.co/Tx5RKX9B/Gemini-Generated-Image-bebzbxbebzbxbebz-1-1-1-1.png', position: 'object-[50%_20%]' },
            { name: 'Claudio Erro', role: 'Vicepresidente', image: 'https://i.ibb.co/3yHz7Rf4/Gemini-Generated-Image-tkvzf1tkvzf1tkvz-1.png', position: 'object-[50%_30%]' },
            { name: 'Graciela Ruiz', role: 'Secretaría General', image: 'https://i.ibb.co/B5CZ3Z8M/Gemini-Generated-Image-jlx7tijlx7tijlx7.png', position: 'object-top' },
            { name: 'CPN Guadalupe Villagra / Ariel Zentner', role: 'Tesorería', image: 'https://i.ibb.co/NdLY92Hs/Gemini-Generated-Image-i82s5ii82s5ii82s.jpg', position: 'object-[50%_20%]' },
            { name: 'Abog. Joan Moyano', role: 'Asesoría Legal', image: 'https://i.ibb.co/8n6tZTb1/Gemini-Generated-Image-7dg3b07dg3b07dg3-1-1.png', position: 'object-[50%_20%]' },
            { name: 'A. Prog. Ana Oddone', role: 'Logística', image: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80' },
            { name: 'Arq. Lucas Roldan', role: 'Comunicación', image: 'https://i.ibb.co/fYsG8sTj/Gemini-Generated-Image-5yavnr5yavnr5yav.png', position: 'object-[50%_20%]' },
            { name: 'Arq. Ezequiel Alcaraz', role: 'Imagen', image: 'https://i.ibb.co/qFrwxkcS/Gemini-Generated-Image-qp533bqp533bqp53-1.png', position: 'object-[50%_20%]' },
            { name: 'Mariana Miranda', role: 'Ceremonial y Protocolo', image: 'https://i.ibb.co/hRQJqCWc/Chat-GPT-Image-29-jun-2026-12-13-25-p-m.png', position: 'object-center' },
            { name: 'Prof. Emiliano Rodriguez', role: 'Deportes', image: 'https://i.ibb.co/NMrzJQv/Whats-App-Image-2026-02-25-at-09-35-37.jpg', position: 'object-[50%_20%]' },
            { name: 'María Diez', role: 'Olimpiadas Solidarias', image: 'https://i.ibb.co/MDNwkxW1/Whats-App-Image-2026-03-02-at-10-42-20.jpg', position: 'object-[50%_20%]' },
            { name: 'A. Prog. Francisco Piu', role: 'Catering y Eventos', image: 'https://i.ibb.co/fzGs4SyJ/Whats-App-Image-2026-02-25-at-09-32-39.jpg', position: 'object-[50%_20%]' },
        ];

        const Authorities = () => {
            const authoritiesData = [
                { name: 'Ing. Walter Vargas', role: 'Presidente', image: 'https://i.ibb.co/Tx5RKX9B/Gemini-Generated-Image-bebzbxbebzbxbebz-1-1-1-1.png', position: 'object-[50%_20%]' },
                { name: 'Claudio Erro', role: 'Vicepresidente', image: 'https://i.ibb.co/3yHz7Rf4/Gemini-Generated-Image-tkvzf1tkvzf1tkvz-1.png', position: 'object-[50%_30%]' },

                { name: 'Abog. Joan Moyano', role: 'Asesoría Legal', image: 'https://i.ibb.co/8n6tZTb1/Gemini-Generated-Image-7dg3b07dg3b07dg3-1-1.png', position: 'object-[50%_20%]' },

                { name: 'Arq. Lucas Roldan', role: 'Comunicación', image: 'https://i.ibb.co/fYsG8sTj/Gemini-Generated-Image-5yavnr5yavnr5yav.png', position: 'object-[50%_20%]' },

                { name: 'María Diez', role: 'Olimpiadas Solidarias', image: 'https://i.ibb.co/MDNwkxW1/Whats-App-Image-2026-03-02-at-10-42-20.jpg', position: 'object-[50%_20%]' },
                { name: 'A. Prog. Francisco Piu', role: 'Catering y Eventos', image: 'https://i.ibb.co/fzGs4SyJ/Whats-App-Image-2026-02-25-at-09-32-39.jpg', position: 'object-[50%_20%]' },
