            const [selectedAuthority, setSelectedAuthority] = useState(null);

            return (
                <section id="autoridades" className="relative z-10">
                    <SectionHeader title="Comité Olímpico" />
                    <div className="container mx-auto px-4 mb-24">
                        <div className="flex justify-center mb-12">
                            {authoritiesData.slice(0, 1).map((auth, index) => (
                                <div key={index} onClick={() => setSelectedAuthority(auth)} className="bg-slate-800/80 backdrop-blur rounded-2xl p-8 flex flex-col items-center text-center border-2 border-brand-accent shadow-[0_0_30px_rgba(132,204,22,0.15)] transform hover:scale-105 transition-all duration-300 max-w-sm w-full cursor-pointer relative group">
                                    <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity text-brand-accent bg-brand-accent/10 p-1.5 rounded-full"><Info size={18} /></div>
                                    <div className="w-32 h-32 mb-6 rounded-full overflow-hidden border-4 border-slate-700 p-1 group-hover:border-brand-accent transition-colors bg-slate-900">
                                        <img src={optimizeImg(auth.image, 250)} alt={auth.name} loading="lazy" className={`w-full h-full object-cover ${auth.position || 'object-center'} rounded-full`} />
                                    </div>
                                    <h3 className="font-bebas text-3xl text-white mb-1 tracking-wide">{auth.name}</h3>
                                    <p className="font-sans text-brand-accent font-bold uppercase text-sm tracking-widest">{auth.role}</p>
                                </div>
                            ))}
                        </div>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {authoritiesData.slice(1).map((auth, index) => (
                                <div key={index} onClick={() => setSelectedAuthority(auth)} className="group bg-slate-800/50 rounded-xl p-6 flex items-center gap-4 border border-white/5 hover:border-brand-accent/50 hover:bg-slate-700/50 transition-all duration-300 cursor-pointer shadow-lg">
                                    <div className="w-16 h-16 flex-shrink-0 rounded-full overflow-hidden border border-slate-600 group-hover:border-brand-accent transition-colors bg-slate-900">
                                        <img src={optimizeImg(auth.image, 130)} alt={auth.name} loading="lazy" className={`w-full h-full object-cover ${auth.position || 'object-center'} grayscale group-hover:grayscale-0 transition-all duration-500`} />
                                    </div>
                                    <div className="text-left flex-grow">
                                        <h3 className="font-bebas text-2xl text-white leading-tight mb-1 group-hover:text-brand-accent transition-colors tracking-wide mt-1">{auth.name}</h3>
                                        <p className="font-sans text-slate-400 text-xs font-semibold uppercase tracking-wide group-hover:text-slate-300 transition-colors">{auth.role}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedAuthority && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={() => setSelectedAuthority(null)}></div>
                            <div className="relative bg-slate-900 w-full max-w-sm rounded-2xl p-8 shadow-2xl animate-fade-in-up border border-white/10 flex flex-col items-center text-center">
                                <button onClick={() => setSelectedAuthority(null)} className="absolute top-4 right-4 z-10 p-2 bg-black/50 text-white rounded-full hover:bg-white hover:text-black transition-colors"><X size={20} /></button>
                                <div className="w-48 h-48 md:w-56 md:h-56 mb-6 rounded-full overflow-hidden border-4 border-brand-accent shadow-[0_0_30px_rgba(132,204,22,0.3)] bg-slate-800">
                                    <img src={optimizeImg(selectedAuthority.image, 450)} alt={selectedAuthority.name} className={`w-full h-full object-cover ${selectedAuthority.position || 'object-center'}`} />
                                </div>
                                <h3 className="font-bebas text-3xl text-white mb-2 tracking-wide">{selectedAuthority.name}</h3>
                                <p className="font-sans text-brand-accent font-bold uppercase tracking-widest text-sm">{selectedAuthority.role}</p>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        const Sponsors = () => {
            const sponsorsData = [
                { tier: 'Platino', styles: 'font-bebas text-4xl md:text-5xl text-slate-600 opacity-70 hover:opacity-100 transition-opacity', companies: ['A Confirmar'] },
                { tier: 'Oro', styles: 'font-bebas text-3xl md:text-4xl text-slate-600 opacity-70 hover:opacity-100 transition-opacity', companies: ['A Confirmar'] },
                { tier: 'Plata', styles: 'font-bebas text-2xl md:text-3xl text-slate-600 opacity-70 hover:opacity-100 transition-opacity', companies: ['A Confirmar'] },
                { tier: 'Bronce', styles: 'font-bebas text-xl md:text-2xl text-slate-600 opacity-70 hover:opacity-100 transition-opacity', companies: ['A Confirmar'] }
            ];

            return (
                <section id="sponsors" className="relative z-10">
                    <SectionHeader title="Sponsors Oficiales">
                        <p className="font-sans text-slate-400 max-w-2xl mx-auto">Empresas e instituciones que hacen posible este evento</p>
                    </SectionHeader>
                    <div className="container mx-auto px-4 mb-24">
                        <div className="flex flex-col gap-16 md:gap-20 max-w-5xl mx-auto">
                            {sponsorsData.map((category, idx) => (
                                <div key={idx} className="flex flex-col items-center">
                                    <h3 className="font-sans text-xs font-bold uppercase tracking-widest mb-8 text-slate-500 border-b border-slate-800 pb-2">
                                        Categoría {category.tier}
                                    </h3>
                                    <div className="flex flex-wrap justify-center items-center gap-x-12 gap-y-8 md:gap-x-20">
                                        {category.companies.map((company, cIdx) => (
                                            <div key={cIdx} className="group relative">
                                                <div className={`cursor-default select-none tracking-wide ${category.styles}`}>
                                                    {company}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-black py-12 border-t border-white/10 relative z-10">
                    <div className="container mx-auto px-4">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <h2 className="font-bebas text-3xl text-white tracking-widest uppercase mt-1">Olimpiadas <span className="text-brand-accent">2026</span></h2>
                                <p className="font-sans text-slate-500 text-sm mt-1">Instituto Provincial de la Vivienda</p>
                            </div>
                            <div className="flex gap-6">
                                <a href="https://www.instagram.com/olimpicosipavlapampa?igsh=MTBvbmNzM3pyeHZ6cQ==" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-slate-400 hover:text-white hover:bg-brand-accent transition-all"><Instagram size={20} /></a>
                                <a href="mailto:olimpicoslapampa@gmail.com" className="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-slate-400 hover:text-white hover:bg-brand-accent transition-all"><Mail size={20} /></a>
                                <a href="https://wa.me/5492954516537" target="_blank" rel="noopener noreferrer" className="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-slate-400 hover:text-white hover:bg-brand-accent transition-all"><Phone size={20} /></a>
                            </div>
                        </div>
                        <div className="mt-12 pt-8 border-t border-white/5 text-center font-sans text-slate-600 text-sm">
                            <p>© 2026 Olimpiadas Nacionales de Empleados de Institutos de Vivienda. Todos los derechos reservados.</p>
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [showBackToTop, setShowBackToTop] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => setShowBackToTop(window.scrollY > 400); 
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

            return (
                <div className="min-h-screen flex flex-col text-slate-100 selection:bg-brand-accent selection:text-brand-dark relative">
                    <AbstractBackground />
                    <Header />
                    <main className="flex-grow z-10 relative">
                        <Hero />
                        <Historia />
                        <Venues />
                        <Disciplines />
                        <Schedule />
                        <Resultados />
                        <Rules />
                        <Tourism />
                        <Authorities />
                        <Sponsors />
                    </main>
                    <AdminResultados />
                    <Footer />

                    <button 
                        onClick={scrollToTop} 
                        className={`fixed bottom-6 right-6 z-40 p-3 bg-slate-800 hover:bg-brand-accent text-brand-accent hover:text-brand-dark border border-slate-700 hover:border-brand-accent rounded-full shadow-2xl transition-all duration-300 transform ${showBackToTop ? 'translate-y-0 opacity-100' : 'translate-y-16 opacity-0 pointer-events-none'}`}
                        aria-label="Volver arriba"
                    >
                        <ArrowUp size={24} />
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
